<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24인 작가전 — 봄의 순간들</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg:         #f6f3ee;
            --sage:       #9baf98;
            --moss:       #6b8f6e;
            --deep:       #3d5c42;
            --text-dark:  #252018;
            --text-mid:   #7a6e62;
            --text-light: #aaa090;
            --white:      #fefcf8;
            --line:       rgba(155,175,152,0.35);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Noto Serif KR', serif;
            overscroll-behavior: none;
            touch-action: pan-x;
            -webkit-tap-highlight-color: transparent;
        }

        /* ══ 헤더 ══ */
        .site-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 300;
            padding: calc(env(safe-area-inset-top, 0px) + 14px) 0 0;
            background: linear-gradient(to bottom,
                rgba(246,243,238,1)    0%,
                rgba(246,243,238,0.98) 70%,
                rgba(246,243,238,0)    100%);
            animation: fade-down 0.7s ease both;
        }

        .header-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 14px;
        }

        .header-tag {
            font-family: 'Cormorant Garamond', serif;
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--moss);
            margin-bottom: 7px;
            opacity: 0.8;
        }

        .header-title {
            font-family: 'Noto Serif KR', serif;
            font-size: clamp(19px, 5.8vw, 26px);
            font-weight: 400;
            color: var(--text-dark);
            letter-spacing: 0.18em;
            line-height: 1;
            margin-bottom: 9px;
        }

        .header-rule {
            width: 32px;
            height: 1px;
            background: var(--line);
            margin-bottom: 9px;
        }

        .header-subs {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .header-sub {
            font-family: 'Noto Serif KR', serif;
            font-size: clamp(10.5px, 3vw, 12.5px);
            font-weight: 300;
            color: var(--text-mid);
            letter-spacing: 0.06em;
            line-height: 1.6;
            text-align: center;
        }

        /* ══ 슬라이더 ══ */
        .swiper {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-frame {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100dvh;
            padding-top: var(--header-h, 118px);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 50px);
            padding-left: 16px;
            padding-right: 16px;
        }

        .poster-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 3px;
            box-shadow:
                0 2px 8px rgba(30,24,16,0.07),
                0 10px 30px rgba(30,24,16,0.11),
                0 0 0 1px rgba(155,175,152,0.2);
            background: var(--white);
            display: block;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .swiper-slide-active .poster-img {
            animation: img-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes img-in {
            from { opacity: 0; transform: scale(0.975) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ══ 하단 바 ══ */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 300;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            pointer-events: none;
        }

        .bottom-bar::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 70px;
            background: linear-gradient(to top,
                rgba(246,243,238,0.92) 0%,
                rgba(246,243,238,0)    100%);
        }

        .bottom-content {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 28px 4px;
        }

        .progress-track {
            flex: 1;
            max-width: 120px;
            height: 1.5px;
            background: rgba(155,175,152,0.22);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sage), var(--moss));
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
            width: 4.17%;
        }

        .counter-wrap {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .counter-current {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            color: var(--deep);
            line-height: 1;
            min-width: 20px;
            text-align: right;
        }

        .counter-sep {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            font-weight: 300;
            color: var(--line);
            margin: 0 2px;
        }

        .counter-total {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            font-weight: 300;
            color: var(--text-light);
        }

        /* ══ 스와이프 힌트 ══ */
        .swipe-hint {
            position: fixed;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 300;
            pointer-events: none;
            animation: hint-in 0.6s 1.6s both;
            transition: opacity 0.45s ease;
        }

        .hint-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(254,252,248,0.85);
            border: 1px solid rgba(155,175,152,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(30,24,16,0.08);
            animation: hint-nudge 2.4s ease-in-out 1.6s infinite;
        }

        .hint-icon svg {
            width: 14px;
            height: 14px;
            fill: var(--moss);
        }

        @keyframes hint-in {
            from { opacity: 0; transform: translateY(-50%) translateX(8px); }
            to   { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        @keyframes hint-nudge {
            0%, 100% { transform: translateX(0); opacity: 0.7; }
            50%       { transform: translateX(5px); opacity: 1; }
        }

        @keyframes fade-down {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 360px) {
            .header-title { font-size: 18px; }
            .header-sub   { font-size: 10px; }
            .header-tag   { font-size: 9px; }
        }
    </style>
</head>
<body>

<header class="site-header" id="site-header">
    <div class="header-inner">
        <p class="header-tag">Spring Exhibition</p>
        <h1 class="header-title">24인 작가전</h1>
        <div class="header-rule"></div>
        <div class="header-subs">
            <p class="header-sub">그림 · 공예 · 캘리그라피 작가 24인</p>
            <p class="header-sub">저마다의 시선으로 담아낸 봄의 순간들</p>
        </div>
    </div>
</header>

<div class="swiper" id="mainSwiper">
    <div class="swiper-wrapper" id="slide-wrapper"></div>
</div>

<div class="bottom-bar">
    <div class="bottom-content">
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="counter-wrap">
            <span class="counter-current" id="counter-current">1</span>
            <span class="counter-sep">·</span>
            <span class="counter-total">24</span>
        </div>
    </div>
</div>

<div class="swipe-hint" id="swipe-hint">
    <div class="hint-icon">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    function setHeaderHeight() {
        const h = document.getElementById('site-header').offsetHeight;
        document.documentElement.style.setProperty('--header-h', (h + 10) + 'px');
    }
    setHeaderHeight();
    window.addEventListener('resize', setHeaderHeight);
    document.fonts.ready.then(setHeaderHeight);

    const wrapper = document.getElementById('slide-wrapper');
    for (let i = 1; i <= 24; i++) {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `<div class="slide-frame"><img src="./${i}.jpg" class="poster-img" alt="작가소개 ${i}번" loading="${i <= 2 ? 'eager' : 'lazy'}"></div>`;
        wrapper.appendChild(slide);
    }

    const counterEl  = document.getElementById('counter-current');
    const progressEl = document.getElementById('progress-fill');

    const swiper = new Swiper('#mainSwiper', {
        loop: true,
        speed: 520,
        threshold: 8,
        touchRatio: 1,
        resistanceRatio: 0.75,
        autoplay: { delay: 4800, disableOnInteraction: false, pauseOnMouseEnter: true },
        on: {
            slideChange() {
                const n = this.realIndex + 1;
                counterEl.textContent = n;
                progressEl.style.width = ((n / 24) * 100).toFixed(2) + '%';
            }
        }
    });

    const hint = document.getElementById('swipe-hint');
    let gone = false;
    function hideHint() {
        if (gone) return;
        gone = true;
        hint.style.opacity = '0';
        setTimeout(() => hint.style.display = 'none', 480);
    }
    swiper.on('touchStart', hideHint);
    swiper.on('slideChange', hideHint);
</script>
</body>
</html>
