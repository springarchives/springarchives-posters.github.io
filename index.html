<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>작가님들의 봄</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            /* 봄 테마 색상 설정 */
            --spring-bg: #fffafb; /* 아주 연한 핑크빛 화이트 */
            --accent-color: #ff9a9e; /* 벚꽃색 */
            --text-dark: #4a4a4a;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: var(--spring-bg); 
            overflow: hidden; 
            font-family: 'Pretendard', sans-serif;
        }

        /* 상단 제목 영역 (심플하고 깨끗하게) */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header h1 {
            color: var(--text-dark);
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: 500;
            margin: 0;
        }

        /* 슬라이더 영역 */
        .swiper { 
            width: 100%; 
            height: 100%; 
        }

        .swiper-slide { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding-top: 60px; /* 헤더 공간 확보 */
        }

        /* 이미지 스타일 (부드러운 그림자) */
        .poster-img { 
            max-width: 85%; 
            max-height: 75vh; 
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(255, 154, 158, 0.15); /* 따뜻한 색감의 그림자 */
            background: white;
        }

        /* [NEW] 우측 중앙 화살표 아이콘 */
        .right-arrow-hint {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: bounceRight 2s infinite;
            pointer-events: none; /* 클릭은 슬라이더가 받도록 설정 */
        }

        .right-arrow-hint svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-color);
        }

        @keyframes bounceRight {
            0%, 20%, 50%, 80%, 100% { transform: translateY(-50%) translateX(0); }
            40% { transform: translateY(-50%) translateX(8px); }
            60% { transform: translateY(-50%) translateX(4px); }
        }

        /* 봄 분위기를 위한 하단 장식 (선택 사항) */
        .spring-deco {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: var(--accent-color);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>우리들의 따스한 기록</h1>
</div>

<div class="swiper">
    <div class="swiper-wrapper" id="slide-wrapper">
        </div>
</div>

<div class="right-arrow-hint">
    <svg viewBox="0 0 24 24">
        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
    </svg>
</div>

<div class="spring-deco">
    🌸 24 ARTISTS EXHIBITION
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const wrapper = document.getElementById('slide-wrapper');
    
    // 1부터 24까지 슬라이드 자동 생성
    for (let i = 1; i <= 24; i++) {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `<img src="./${i}.jpg" class="poster-img" alt="작가 소개 ${i}">`;
        wrapper.appendChild(slide);
    }

    const swiper = new Swiper('.swiper', {
        loop: true,
        speed: 600,
        autoplay: {
            delay: 4000, // 4초마다 자동으로 다음 작가로 넘김 (원치 않으시면 삭제 가능)
            disableOnInteraction: false,
        },
    });
</script>
</body>
</html>
