<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARTIST GALLERY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            background: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* 슬라이더 */
        .swiper {
            flex: 1;
            min-height: 0;
            width: 100%;
            position: relative;
        }
        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            position: relative;
        }
        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 이미지 상단을 덮는 흰색 오버레이 + 행사 텍스트 */
        .img-top-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 16px 20px 14px;
            text-align: center;
            z-index: 5;
        }
        .event-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: #3a8c1c;
            letter-spacing: 0.01em;
            margin-bottom: 4px;
        }
        .event-date {
            font-size: 0.72rem;
            font-weight: 400;
            color: #999;
        }

        /* 페이지네이션 */
        .swiper-pagination {
            position: relative !important;
            bottom: auto !important;
            padding: 10px 0 0;
            flex-shrink: 0;
        }
        .swiper-pagination-bullet {
            background: #3a8c1c;
            opacity: 0.25;
            width: 6px;
            height: 6px;
        }
        .swiper-pagination-bullet-active {
            background: #3a8c1c;
            opacity: 1;
            width: 20px;
            border-radius: 3px;
        }

        /* 하단 설명 */
        .info-bottom {
            padding: 10px 20px 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .desc {
            font-size: 0.72rem;
            font-weight: 300;
            color: #aaa;
            line-height: 1.9;
        }
    </style>
</head>
<body>

<div class="page">

    <div class="swiper">
        <div class="swiper-wrapper" id="slide-wrapper"></div>

        <!-- 이미지 상단 덮개 -->
        <div class="img-top-overlay">
            <div class="event-title">2026 봄 핸드메이드 마르쉐 in 도시제조허브</div>
            <div class="event-date">2026. 5. 4 – 5. 28</div>
        </div>
    </div>

    <div class="swiper-pagination"></div>

    <div class="info-bottom">
        <div class="desc">
            다양한 분야의 작가 24인이<br>
            저마다의 시선으로 담아낸 계절의 순간들.
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const wrapper = document.getElementById('slide-wrapper');
    for (let i = 1; i <= 24; i++) {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <img src="./${i}.jpg" class="poster-img" alt="작가소개 ${i}">
            </div>`;
    }

    new Swiper('.swiper', {
        loop: false,
        pagination: { el: '.swiper-pagination', clickable: true },
        resistance: true,
        resistanceRatio: 0,
    });
</script>
</body>
</html>
