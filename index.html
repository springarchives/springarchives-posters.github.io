<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artist Gallery Exhibition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg-color: #1a1a1a;
            --ui-bg: rgba(0, 0, 0, 0.6);
            --text-color: #ffffff;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: var(--bg-color); 
            overflow: hidden; 
            font-family: 'Pretendard', -apple-system, sans-serif;
        }

        /* 위아래 UI가 심심하지 않도록 그라데이션 및 블러 효과 적용 */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to bottom, var(--ui-bg), transparent);
            backdrop-filter: blur(5px);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            color: var(--text-color);
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 300;
            margin: 0;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, var(--ui-bg), transparent);
            backdrop-filter: blur(5px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 슬라이더 영역 */
        .swiper { 
            width: 100%; 
            height: 100%; 
        }

        .swiper-slide { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        /* 이미지가 화면에 꽉 차면서도 비율을 유지하게 설정 */
        .poster-img { 
            max-width: 90%; 
            max-height: 75vh; 
            object-fit: contain;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        /* 오른쪽 넘기기 아이콘 애니메이션 */
        .swipe-hint {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            animation: moveIcon 1.5s infinite;
        }

        @keyframes moveIcon {
            0% { transform: translateX(0); opacity: 0.4; }
            50% { transform: translateX(10px); opacity: 1; }
            100% { transform: translateX(0); opacity: 0.4; }
        }

        .arrow-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-left: 5px;
        }

        /* 배경이 심심하지 않도록 각 슬라이드 뒤에 이미지를 흐리게 배치 */
        .bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px) brightness(0.4);
            z-index: -1;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>ONLINE ART GALLERY</h1>
</div>

<div class="swiper">
    <div class="swiper-wrapper" id="slide-wrapper">
        </div>
</div>

<div class="footer">
    <div class="swipe-hint">
        <span>NEXT</span>
        <svg class="arrow-svg" viewBox="0 0 24 24">
            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
        </svg>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const wrapper = document.getElementById('slide-wrapper');
    
    // 1.jpg부터 24.jpg까지 슬라이드 생성
    for (let i = 1; i <= 24; i++) {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `
            <div class="bg-blur" style="background-image: url('./${i}.css' ? './${i}.jpg' : './${i}.jpg')"></div>
            <img src="./${i}.jpg" class="poster-img" alt="작가소개 ${i}">
        `;
        wrapper.appendChild(slide);
    }

    const swiper = new Swiper('.swiper', {
        loop: true,
        speed: 600,
        grabCursor: true,
        // 동그라미(pagination)는 제거되었습니다.
    });
</script>
</body>
</html>
