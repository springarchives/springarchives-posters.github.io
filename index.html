<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARTIST GALLERY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            background: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        .page {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ── 상단 텍스트 영역 ── */
        .info-top {
            flex-shrink: 0;
            padding: 24px 24px 16px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }
        .event-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #3a8c1c;
            margin-bottom: 5px;
            line-height: 1.5;
        }
        .event-date {
            font-size: 0.73rem;
            font-weight: 300;
            color: #aaa;
            letter-spacing: 0.04em;
        }

        /* ── 슬라이더 ── */
        .swiper {
            flex: 1;
            min-height: 0;
            width: 100%;
        }
        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }
        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* ── 페이지네이션 ── */
        .swiper-pagination {
            position: relative !important;
            bottom: auto !important;
            flex-shrink: 0;
            padding: 12px 0;
            border-top: 1px solid #f0f0f0;
        }
        .swiper-pagination-bullet {
            background: #3a8c1c;
            opacity: 0.2;
            width: 6px;
            height: 6px;
        }
        .swiper-pagination-bullet-active {
            background: #3a8c1c;
            opacity: 1;
            width: 20px;
            border-radius: 3px;
        }

        /* ── 하단 텍스트 영역 ── */
        .info-bottom {
            flex-shrink: 0;
            padding: 14px 24px 28px;
            text-align: center;
        }
        .desc {
            font-size: 0.73rem;
            font-weight: 300;
            color: #bbb;
            line-height: 1.9;
        }
    </style>
</head>
<body>

<div class="page">

    <div class="info-top">
        <div class="event-title">2026 봄 핸드메이드 마르쉐 in 도시제조허브</div>
        <div class="event-date">2026. 5. 4 – 5. 28</div>
    </div>

    <div class="swiper">
        <div class="swiper-wrapper" id="slide-wrapper"></div>
    </div>

    <div class="swiper-pagination"></div>

    <div class="info-bottom">
        <div class="desc">
            다양한 분야의 작가 24인이<br>
            저마다의 시선으로 담아낸 계절의 순간들.
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const wrapper = document.getElementById('slide-wrapper');
    for (let i = 1; i <= 24; i++) {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <img src="./${i}.jpg" class="poster-img" alt="작가소개 ${i}">
            </div>`;
    }

    new Swiper('.swiper', {
        loop: false,
        pagination: { el: '.swiper-pagination', clickable: true },
        resistance: true,
        resistanceRatio: 0,
    });
</script>
</body>
</html>
