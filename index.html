<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTIST GALLERY</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #111; overflow: hidden; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }
        .poster-img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* 이미지가 잘리지 않고 화면에 꽉 차게 설정 */
        }
        /* 페이지 표시 (점) 색상 변경 */
        .swiper-pagination-bullet { background: #fff; opacity: 0.5; }
        .swiper-pagination-bullet-active { background: #fff; opacity: 1; }
    </style>
</head>
<body>

<div class="swiper">
    <div class="swiper-wrapper" id="slide-wrapper">
        </div>
    <div class="swiper-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const wrapper = document.getElementById('slide-wrapper');
    // 1부터 24까지 반복하며 슬라이드 생성
    for (let i = 1; i <= 24; i++) {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <img src="./${i}.jpg" class="poster-img" alt="작가소개 ${i}">
            </div>`;
    }

    const swiper = new Swiper('.swiper', {
        loop: false, // 마지막 작가에서 멈춤 (원하면 true로 변경)
        pagination: { el: '.swiper-pagination' },
        resistance: true,
        resistanceRatio: 0,
    });
</script>
</body>
</html>
